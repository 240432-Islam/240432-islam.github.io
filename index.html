<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Монитор статусов</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c28;
      --border: #2a2a3d;
      --accent: #7c6af7;
      --accent2: #4fc8a8;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --online: #4fc8a8;
      --away: #f5a623;
      --busy: #f45b5b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 16px;
      color: var(--text);
    }
    .container { width: 100%; max-width: 480px; }

    .header { margin-bottom: 24px; }
    .header-label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      font-family: 'Syne', sans-serif;
      margin-bottom: 8px;
    }
    .header h1 { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; }
    .header h1 span { color: var(--accent); }

    /* LOGIN */
    #loginScreen {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    #loginScreen::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }
    .login-icon { font-size: 3rem; margin-bottom: 16px; }
    .login-title { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 700; margin-bottom: 8px; }
    .login-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 32px; line-height: 1.5; }
    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 14px 24px;
      background: white;
      color: #333;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .google-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
    .google-btn:active { transform: translateY(0); }

    /* APP */
    #appScreen { display: none; }

    .my-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }
    .my-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }
    .my-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .my-card-label { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
    .logout-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .logout-btn:hover { border-color: var(--busy); color: var(--busy); }
    .my-card-content { display: flex; align-items: center; gap: 14px; }
    .my-avatar {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.1rem;
      color: white; flex-shrink: 0; overflow: hidden;
    }
    .my-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .my-name { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 1rem; }
    .my-status { font-size: 0.85rem; color: var(--muted); margin-top: 3px; display: flex; align-items: center; gap: 6px; }
    .status-dot-sm { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 24px; }
    .status-btn {
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; font-weight: 500;
      cursor: pointer;
      transition: all 0.18s ease;
      display: flex; align-items: center; gap: 10px;
    }
    .status-btn:hover { border-color: var(--accent); background: var(--surface2); transform: translateY(-1px); }
    .status-btn:active { transform: translateY(0); }
    .status-btn .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .status-btn.active { border-color: var(--accent); background: rgba(124,106,247,0.1); }

    .stats-bar {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px 20px;
      display: flex; margin-bottom: 20px;
    }
    .stat { flex: 1; text-align: center; position: relative; }
    .stat + .stat::before { content: ''; position: absolute; left: 0; top: 10%; bottom: 10%; width: 1px; background: var(--border); }
    .stat-num { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 700; line-height: 1; }
    .stat-num.green { color: var(--online); }
    .stat-num.yellow { color: var(--away); }
    .stat-num.red { color: var(--busy); }
    .stat-lbl { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px; }

    .section-title {
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 0.85rem; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 10px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .count-badge { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-size: 0.75rem; padding: 2px 8px; border-radius: 20px; }
    .user-list { display: flex; flex-direction: column; gap: 6px; }
    .user-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 16px;
      display: flex; align-items: center; gap: 14px; transition: all 0.15s;
    }
    .user-item:hover { background: var(--surface2); }
    .user-item.is-me { border-color: rgba(124,106,247,0.4); background: rgba(124,106,247,0.05); }
    .avatar {
      width: 38px; height: 38px; border-radius: 10px;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem;
      color: var(--muted); flex-shrink: 0; position: relative; overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
    .avatar-badge { position: absolute; bottom: -3px; right: -3px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--surface); }
    .user-meta { flex: 1; min-width: 0; }
    .user-name { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .you-tag { font-family: 'DM Sans', sans-serif; font-size: 0.7rem; color: var(--accent); background: rgba(124,106,247,0.15); padding: 1px 6px; border-radius: 4px; margin-left: 6px; }
    .user-status-text { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
    .status-indicator { width: 32px; height: 32px; border-radius: 8px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
    .state-msg { text-align: center; padding: 32px; color: var(--muted); font-size: 0.9rem; }
    .pulse { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .footer { text-align: center; color: var(--muted); font-size: 0.75rem; margin-top: 20px; padding-bottom: 8px; }
    .live-dot { display: inline-block; width: 6px; height: 6px; background: var(--accent2); border-radius: 50%; margin-right: 6px; animation: pulse 2s infinite; }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-label">Realtime Monitor</div>
    <h1>Статусы <span>группы</span></h1>
  </div>

  <!-- ЭКРАН ВХОДА -->
  <div id="loginScreen">
    <div class="login-icon">👥</div>
    <div class="login-title">Войдите в систему</div>
    <div class="login-sub">Используйте аккаунт Google чтобы войти и видеть статусы участников группы</div>
    <button class="google-btn" onclick="loginWithGoogle()">
      <svg width="22" height="22" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Войти через Google
    </button>
  </div>

  <!-- ОСНОВНОЙ ЭКРАН -->
  <div id="appScreen">
    <div class="my-card">
      <div class="my-card-top">
        <div class="my-card-label">Ваш профиль</div>
        <button class="logout-btn" onclick="logout()">Выйти</button>
      </div>
      <div class="my-card-content">
        <div class="my-avatar" id="myAvatar">?</div>
        <div>
          <div class="my-name" id="myName">Загрузка...</div>
          <div class="my-status">
            <div class="status-dot-sm" id="myDot" style="background:var(--muted)"></div>
            <span id="myStatusText">—</span>
          </div>
        </div>
      </div>
    </div>

    <div class="status-grid">
      <button class="status-btn" id="btn-online" onclick="changeStatus('В сети')">
        <div class="dot" style="background:#4fc8a8"></div> В сети
      </button>
      <button class="status-btn" id="btn-away" onclick="changeStatus('Отошёл')">
        <div class="dot" style="background:#f5a623"></div> Отошёл
      </button>
      <button class="status-btn" id="btn-busy" onclick="changeStatus('Занят')">
        <div class="dot" style="background:#f45b5b"></div> Занят
      </button>
      <button class="status-btn" id="btn-dnd" onclick="changeStatus('Не беспокоить')">
        <div class="dot" style="background:#6b6b80"></div> Не беспокоить
      </button>
    </div>

    <div class="stats-bar">
      <div class="stat">
        <div class="stat-num green" id="cnt-online">0</div>
        <div class="stat-lbl">онлайн</div>
      </div>
      <div class="stat">
        <div class="stat-num yellow" id="cnt-away">0</div>
        <div class="stat-lbl">отошли</div>
      </div>
      <div class="stat">
        <div class="stat-num red" id="cnt-busy">0</div>
        <div class="stat-lbl">заняты</div>
      </div>
    </div>

    <div class="section-title">
      Участники <span class="count-badge" id="total-count">0</span>
    </div>
    <div class="user-list" id="userList">
      <div class="state-msg pulse">Загрузка...</div>
    </div>

    <div class="footer">
      <span class="live-dot"></span>Обновление в реальном времени · Supabase Realtime
    </div>
  </div>

</div>
<script>
  const { createClient } = window.supabase;

  const SUPABASE_URL  = 'https://amcacekhqgycrnqzgtch.supabase.co';
  const SUPABASE_KEY  = 'sb_publishable_2pt4bLheDvE-TU-9m129UQ_YyY0YxER';

  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  const STATUS_MAP = {
    'В сети':        { color: '#4fc8a8', emoji: '🟢', btn: 'btn-online' },
    'Отошёл':        { color: '#f5a623', emoji: '🟡', btn: 'btn-away' },
    'Занят':         { color: '#f45b5b', emoji: '🔴', btn: 'btn-busy' },
    'Не беспокоить': { color: '#6b6b80', emoji: '⚫', btn: 'btn-dnd' },
  };

  let currentUserId = null;

  // ── Вход через Google ────────────────────────────
  window.loginWithGoogle = async () => {
    const { error } = await db.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: 'https://240432-islam.github.io/' }
    });
    if (error) alert('Ошибка входа: ' + error.message);
  };

  // ── Выход ────────────────────────────────────────
  window.logout = async () => {
    if (currentUserId) {
      await db.from('profiles').update({ status: 'Не беспокоить' }).eq('id', currentUserId);
    }
    await db.auth.signOut();
    currentUserId = null;
    document.getElementById('appScreen').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'block';
  };

  // ── Изменить статус ──────────────────────────────
  window.changeStatus = async (text) => {
    if (!currentUserId) return;
    document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
    const map = STATUS_MAP[text];
    if (map) document.getElementById(map.btn)?.classList.add('active');
    const { error } = await db.from('profiles').update({ status: text }).eq('id', currentUserId);
    if (error) alert('Ошибка: ' + error.message);
  };

  function getInitial(name) { return (name || '?').charAt(0).toUpperCase(); }

  function updateMyCard(user) {
    if (!user) return;
    const el = document.getElementById('myAvatar');
    el.innerHTML = user.avatar_url ? `<img src="${user.avatar_url}" alt="">` : getInitial(user.username);
    document.getElementById('myName').textContent = user.username || 'Без имени';
    document.getElementById('myStatusText').textContent = user.status || '—';
    const map = STATUS_MAP[user.status];
    document.getElementById('myDot').style.background = map ? map.color : '#6b6b80';
    document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
    if (map) document.getElementById(map.btn)?.classList.add('active');
  }

  function renderUsers(users) {
    const list = document.getElementById('userList');
    if (!users?.length) { list.innerHTML = '<div class="state-msg">Нет участников</div>'; return; }

    const sorted = [...users].sort((a, b) => {
      const aO = a.status === 'В сети' ? 0 : 1;
      const bO = b.status === 'В сети' ? 0 : 1;
      if (aO !== bO) return aO - bO;
      return (a.username || '').localeCompare(b.username || '');
    });

    list.innerHTML = sorted.map(u => {
      const map = STATUS_MAP[u.status] || { color: '#6b6b80', emoji: '⚪' };
      const isMe = u.id === currentUserId;
      const avatarHtml = u.avatar_url ? `<img src="${u.avatar_url}" alt="">` : getInitial(u.username);
      return `
        <div class="user-item ${isMe ? 'is-me' : ''}">
          <div class="avatar">
            ${avatarHtml}
            <div class="avatar-badge" style="background:${map.color}"></div>
          </div>
          <div class="user-meta">
            <div class="user-name">${u.username || 'Без имени'}${isMe ? '<span class="you-tag">вы</span>' : ''}</div>
            <div class="user-status-text">${map.emoji} ${u.status || 'Нет статуса'}</div>
          </div>
          <div class="status-indicator">${map.emoji}</div>
        </div>`;
    }).join('');

    document.getElementById('total-count').textContent = users.length;
    document.getElementById('cnt-online').textContent = users.filter(u => u.status === 'В сети').length;
    document.getElementById('cnt-away').textContent = users.filter(u => u.status === 'Отошёл').length;
    document.getElementById('cnt-busy').textContent = users.filter(u => u.status === 'Занят' || u.status === 'Не беспокоить').length;
    updateMyCard(users.find(u => u.id === currentUserId));
  }

  async function loadData() {
    const { data, error } = await db.from('profiles').select('*').order('username', { ascending: true });
    if (!error) renderUsers(data || []);
  }

  function subscribe() {
    db.channel('profiles_realtime')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'profiles' }, () => loadData())
      .subscribe();
  }

  // ── Запуск приложения после входа ───────────────
  async function startApp(session) {
    currentUserId = session.user.id;

    // Создаём или обновляем профиль
    const name = session.user.user_metadata?.full_name
               || session.user.user_metadata?.name
               || session.user.email?.split('@')[0]
               || 'Пользователь';

    const avatar = session.user.user_metadata?.avatar_url || null;

    // Проверяем есть ли уже профиль
    const { data: existing } = await db
      .from('profiles')
      .select('id')
      .eq('id', currentUserId)
      .maybeSingle();

    if (existing) {
      // Обновляем статус на "В сети"
      await db.from('profiles')
        .update({ status: 'В сети', username: name })
        .eq('id', currentUserId);
    } else {
      // Создаём новый профиль
      await db.from('profiles').insert({
        id: currentUserId,
        username: name,
        status: 'В сети'
      });
    }

    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'block';

    await loadData();
    subscribe();
    setInterval(loadData, 5000);
  }

  // ── Инициализация ────────────────────────────────
  async function init() {
    const { data: { session } } = await db.auth.getSession();
    if (session) {
      await startApp(session);
    }
  }

  db.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session && !currentUserId) {
      await startApp(session);
    }
  });

  init().catch(console.error);
</script>
</body>
</html>
